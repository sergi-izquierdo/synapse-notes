name: Claude Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'agent-cloud') ||
      (github.event_name == 'issues' && github.event.label.name == 'agent-ready') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment') ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: "Bash,Read,Edit,Write,Glob,Grep,Agent"
          custom_instructions: |
            Follow these rules strictly:
            - Run npm install and npm run build BEFORE making changes
            - Run npm run lint to check baseline errors
            - Never commit .env files, secrets, or API keys
            - No any types in TypeScript — use proper typing
            - No files over 500 lines — split into modules
            - Include tests for new features
            - Use dark: prefixed Tailwind classes for theme support
            - After finishing, run npm run build and npm test to verify
            - Commit with clear messages referencing the issue number
